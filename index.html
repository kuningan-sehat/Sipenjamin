          const forceDownload = async (url, fileName) => {
              showToast("Memulai unduhan...");
              try {
                  const cleanUrl = url.replace('/upload/fl_attachment/', '/upload/');
                  const response = await fetch(cleanUrl);
                  if (!response.ok) throw new Error('Gagal mengambil file');
                  const blob = await response.blob();
                  const blobUrl = window.URL.createObjectURL(blob);
                  const link = document.createElement('a');
                  link.href = blobUrl; link.download = fileName || 'Dokumen_Rekomendasi.pdf';
                  document.body.appendChild(link); link.click(); document.body.removeChild(link);
                  window.URL.revokeObjectURL(blobUrl);
              } catch (error) {
                  window.open(url.replace('/upload/fl_attachment/', '/upload/'), '_blank');
              }
          };

          useEffect(() => {
            const initAuth = async () => {
              try { 
                  await signInAnonymously(auth); 
              } catch (err) { 
                  setErrorMsg("Gagal terhubung ke Server."); 
              }
            };
            initAuth();

            const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
              setUser(currentUser);
              if (!currentUser || appState === 'loading') setAppState('login');
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return; 

            // Listener Sandi Admin
            const adminRef = doc(db, 'admin', 'dinkes');
            const unsubAdmin = onSnapshot(adminRef, (docSnap) => {
              if (docSnap.exists()) {
                  setAdminData(docSnap.data());
              }
            });

            if (appState !== 'dashboard') return;

            // Listener Permohonan
            const permohonanRef = collection(db, 'permohonan_jamkesda');
            const unsubscribePermohonan = onSnapshot(permohonanRef, (snapshot) => {
              const data = [];
              snapshot.forEach(document => data.push({ id: document.id, ...document.data() }));
              data.sort((a, b) => b.createdAt - a.createdAt);
              setPermohonanList(data);
            });

            // Listener Akun Desa (Hanya Admin)
            let unsubscribeAkun = () => {};
            if (loginRole === 'dinas') {
              const akunRef = collection(db, 'akun_desa');
              unsubscribeAkun = onSnapshot(akunRef, (snapshot) => {
                const akunData = [];
                snapshot.forEach(document => akunData.push({ id: document.id, ...document.data() }));
                setAkunDesaList(akunData);
              });
            }

            return () => { unsubAdmin(); unsubscribePermohonan(); unsubscribeAkun(); };
          }, [user, appState, loginRole]);

          const showToast = (msg) => {
             setToastMsg(msg); 
             setTimeout(() => setToastMsg(''), 3000);
          }

          const handleLogin = async (e) => {
            e.preventDefault(); 
            setErrorMsg('');

            if (loginRole === 'dinas') {
              const currentAdminPwd = adminData?.password || 'Dinkes2026';
              if (dinasUsername === 'admin' && password === currentAdminPwd) {
                setAppState('dashboard'); 
                setCurrentView('dashboard'); 
                setTableTabFilter('pending'); 
                return;
              } else {
                setErrorMsg('Username atau Password Dinas salah!'); 
                return;
              }
            }

            if (!loginKecamatan || !loginDesa || !password) { 
                setErrorMsg('Data login belum lengkap.'); 
                return; 
            }

            try {
              const docId = `${loginKecamatan}_${loginDesa}`.replace(/\s+/g, '_');
              const akunRef = doc(db, 'akun_desa', docId);
              const akunSnap = await getDoc(akunRef);
              
              if (!akunSnap.exists()) {
                if (password === 'Jamkesda2026') {
                    setAppState('change-password');
                } else {
                    setErrorMsg('Sandi salah atau belum didaftarkan.');
                }
              } else {
                const dataAkun = akunSnap.data();
                if (password !== dataAkun.password) { 
                    setErrorMsg('Sandi salah.'); 
                    return; 
                }
                if (dataAkun.status === 'pending') {
                    setAppState('waiting-approval');
                } else if (dataAkun.status === 'approved') {
                  setAppState('dashboard'); 
                  setCurrentView('dashboard'); 
                  setTableTabFilter('pending');
                }
              }
            } catch (err) { 
                setErrorMsg('Gagal memverifikasi akun.'); 
            }
          };

          const handleChangePassword = async (e) => {
            e.preventDefault();
            if (newPassword.length < 6) { setErrorMsg('Sandi minimal 6 karakter.'); return; }
            if (newPassword !== confirmPassword) { setErrorMsg('Sandi tidak cocok.'); return; }
            try {
              const docId = `${loginKecamatan}_${loginDesa}`.replace(/\s+/g, '_');
              await setDoc(doc(db, 'akun_desa', docId), { 
                  kecamatan: loginKecamatan, 
                  desa: loginDesa, 
                  password: newPassword, 
                  status: 'pending', 
                  updatedAt: Date.now() 
              });
              setAppState('waiting-approval');
            } catch (err) { 
                setErrorMsg('Gagal menyimpan.'); 
            }
          };

          const handleUpdateAdminPassword = async () => {
              if(adminNewPassword.length < 6) { 
                  showToast("Sandi admin minimal 6 karakter!"); 
                  return; 
              }
              setIsAdminUpdating(true);
              try {
                  await setDoc(doc(db, 'admin', 'dinkes'), { password: adminNewPassword }, { merge: true });
                  showToast("Sandi Admin berhasil diperbarui!");
                  setAdminNewPassword('');
                  setShowAdminPassword(false);
              } catch(e) {
                  showToast("Gagal memperbarui sandi Admin.");
              } finally {
                  setIsAdminUpdating(false);
              }
          };

          const handleAddPermohonan = async (e) => {
            e.preventDefault(); 
            setIsSubmitting(true);
            const form = e.target; 
            const fd = new FormData(form); 
            const rawData = Object.fromEntries(fd.entries());
            
            if(!rawData.nik || !rawData.nama) { 
                showToast("NIK dan Nama wajib diisi!"); 
                setIsSubmitting(false); 
                return; 
            }

            const detailData = {};
            allFormFields.forEach(f => detailData[f] = "");
            
            for (const [key, value] of fd.entries()) {
                if (value instanceof File) detailData[key] = null;
                else detailData[key] = value || "";
            }

            const currentYear = new Date().getFullYear();
            const folderDesa = `Jamkesda_${currentYear}`;

            const uploadPromises = [];
            Array.from(form.elements).forEach(el => {
                if(el.type === 'file' && el.files.length > 0) {
                    const file = el.files[0]; 
                    const formData = new FormData();
                    formData.append('file', file); 
                    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                    formData.append('folder', folderDesa); // Auto Folder Tahunan

                    const uploadTask = fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, { 
                        method: 'POST', body: formData 
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.secure_url) {
                            detailData[el.name] = { url: data.secure_url, path: data.public_id, name: file.name };
                        } else if (data.error) {
                            throw new Error(data.error.message);
                        }
                    }).catch(err => { 
                        detailData[el.name] = null; 
                    });
                    
                    uploadPromises.push(uploadTask);
                }
            });

            try {

                                                    <td className="text-center align-middle">
                                                        <div className="flex flex-wrap justify-center gap-1.5">
                                                            <button onClick={() => setDetailModalData(item)} className="bg-[#4a148c] text-white p-1.5 rounded hover:bg-[#6a1b9a]" title="Detail">
                                                                <FileText size={14}/>
                                                            </button>
                                                            
                                                            {tableTabFilter === 'pending' && loginRole === 'dinas' && (
                                                                <>
                                                                    <button onClick={() => setTerimaModalId(item.id)} className="bg-green-600 text-white p-1.5 rounded hover:bg-green-700"><Check size={14}/></button>
                                                                    <button onClick={() => setTolakModalId(item.id)} className="bg-red-600 text-white p-1.5 rounded hover:bg-red-700"><X size={14}/></button>
                                                                </>
                                                            )}
                                                            
                                                            {tableTabFilter === 'pending' && loginRole === 'desa' && (
                                                                <button onClick={() => setHapusTarget(item)} className="bg-red-600 text-white p-1.5 rounded hover:bg-red-700"><Trash2 size={14}/></button>
                                                            )}
                                                            
                                                            {tableTabFilter === 'menunggu_ttd' && loginRole === 'dinas' && (
                                                                <>
                                                                    <button onClick={() => cetakDraftRekomendasiPDF(item)} className="bg-gray-600 text-white p-1.5 rounded hover:bg-gray-700"><Printer size={14}/></button>
                                                                    <button onClick={() => setUploadRekomId(item.id)} className="bg-blue-600 text-white p-1.5 rounded hover:bg-blue-700"><UploadCloud size={14}/></button>
                                                                </>
                                                            )}
                                                            
                                                            {tableTabFilter === 'selesai' && item.file_rekomendasi?.url && (
                                                                <button onClick={() => forceDownload(item.file_rekomendasi.url, item.file_rekomendasi.name)} className="bg-green-600 text-white p-1.5 rounded hover:bg-green-700"><Download size={14}/></button>
                                                            )}
                                                            
                                                            {loginRole === 'dinas' && (
                                                                <button onClick={() => setHapusTarget(item)} className="bg-gray-200 text-red-600 p-1.5 rounded hover:bg-red-100"><Trash2 size={14}/></button>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            )) : (
                                                <tr><td colSpan="5" className="text-center py-8 text-gray-500 italic">Tidak ada data.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* View: FORM DESA */}
                    {currentView === 'form' && loginRole === 'desa' && (
                        <div className="space-y-6 animate-zoom-in">
                            <div className="flex justify-between items-center mb-6">
                                <div><h1 className="text-2xl font-bold">Form Permohonan</h1></div>
                                <button onClick={() => setCurrentView('dashboard')} className="px-4 py-2 bg-gray-200 rounded-md text-sm font-bold shadow">&larr; Kembali</button>
                            </div>
                            <div className="bg-white rounded-lg shadow-xl border overflow-hidden">
                                <div className="flex border-b bg-gray-50">
                                    <button onClick={() => setCurrentFormTab('umum')} className={`flex-1 py-4 text-sm font-bold ${currentFormTab === 'umum' ? 'tab-btn active' : 'text-gray-500'}`}>UMUM</button>
                                    <button onClick={() => setCurrentFormTab('persalinan')} className={`flex-1 py-4 text-sm font-bold ${currentFormTab === 'persalinan' ? 'tab-btn active' : 'text-gray-500'}`}>PERSALINAN</button>
                                    <button onClick={() => setCurrentFormTab('bayi')} className={`flex-1 py-4 text-sm font-bold ${currentFormTab === 'bayi' ? 'tab-btn active' : 'text-gray-500'}`}>BAYI</button>
                                </div>
                                <div className="p-8 border-t-8 border-[#5e35b1]">
                                    <form onSubmit={handleAddPermohonan}>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">NIK</label>
                                                    <input type="text" name="nik" required className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">Nama Lengkap</label>
                                                    <input type="text" name="nama" required className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">Tempat, Tanggal Lahir</label>
                                                    <input type="text" name="ttl" className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">Jenis Kelamin</label>
                                                    <select name="jk" className="w-full text-sm p-2.5 border rounded bg-gray-50">
                                                        <option value="">Pilih...</option>
                                                        <option value="Laki-laki">Laki-laki</option>
                                                        <option value="Perempuan">Perempuan</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">Alamat Lengkap</label>
                                                    <input type="text" name="alamat" className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">No KK</label>
                                                    <input type="text" name="nokk" className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">Nama KK</label>
                                                    <input type="text" name="namakk" className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                </div>
                                                
                                                {currentFormTab === 'umum' && (
                                                    <div>
                                                        <label className="block text-xs font-bold mb-1">NIK KK</label>
                                                        <input type="text" name="nikkk" className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                    </div>
                                                )}
                                                
                                                {currentFormTab === 'bayi' && (
                                                    <>
                                                        <div><label className="block text-xs font-bold mb-1">NIK Ayah</label><input type="text" name="nik_ayah" className="w-full text-sm p-2.5 border rounded bg-gray-50" /></div>
                                                        <div><label className="block text-xs font-bold mb-1">NIK Ibu</label><input type="text" name="nik_ibu" className="w-full text-sm p-2.5 border rounded bg-gray-50" /></div>
                                                    </>
                                                )}
                                                
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">Desa</label>
                                                    <input type="text" value={loginDesa} readOnly className="w-full text-sm p-2.5 border rounded bg-gray-200" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">Kecamatan</label>
                                                    <input type="text" value={loginKecamatan} readOnly className="w-full text-sm p-2.5 border rounded bg-gray-200" />
                                                </div>
                                            </div>
                                            
                                            <div className="space-y-4">
                                                {currentFormTab !== 'bayi' && (
                                                    <div><label className="block text-xs font-bold mb-1">Rujukan Puskesmas</label><input type="text" name="rujukan" className="w-full text-sm p-2.5 border rounded bg-gray-50" /></div>
                                                )}
                                                
                                                {currentFormTab === 'bayi' && (
                                                    <div><label className="block text-xs font-bold mb-1">Rujukan Poned</label><input type="text" name="rujukan_poned" className="w-full text-sm p-2.5 border rounded bg-gray-50" /></div>
                                                )}
                                                
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">No Register RS</label>
                                                    <input type="text" name="noreg" className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                </div>
                                                
                                                {currentFormTab !== 'umum' && (
                                                    <div><label className="block text-xs font-bold mb-1">SK Dirawat</label><input type="text" name="sk_dirawat" className="w-full text-sm p-2.5 border rounded bg-gray-50" /></div>
                                                )}
                                                
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">SKM Desa</label>
                                                    <input type="text" name="skm_desa" className="w-full text-sm p-2.5 border rounded bg-gray-50" />
                                                </div>
                                                
                                                {currentFormTab !== 'bayi' && (
                                                    <>
                                                        <div><label className="block text-xs font-bold mb-1">SKM Dinsos</label><input type="text" name="skm_dinsos" className="w-full text-sm p-2.5 border rounded bg-gray-50" /></div>
                                                        <div><label className="block text-xs font-bold mb-1">SK Kerja Desa</label><input type="text" name="sk_kerja" className="w-full text-sm p-2.5 border rounded bg-gray-50" /></div>
                                                    </>
                                                )}
                                                
                                                <div>
                                                    <label className="block text-xs font-bold mb-1">RS Rujukan</label>
                                                    <select name="rs_rujukan" className="w-full text-sm p-2.5 border rounded bg-gray-50">
                                                        <option value="">Pilih...</option>
                                                        {daftarRS.map(rs => <option key={rs} value={rs}>{rs}</option>)}
                                                    </select>
                                                </div>
                                                
                                                <div className="pt-4 border-t mt-4 border-gray-200 space-y-3">
                                                    <h3 className="font-bold text-sm text-[#4a148c]">Unggah Dokumen (PDF/Gambar)</h3>
                                                    
                                                    {currentFormTab === 'umum' && (
                                                        <>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">Scan Pernyataan Materai</label><input type="file" name="scan_pernyataan" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">Scan SK Dirawat</label><input type="file" name="scan_dirawat" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">Scan Picare</label><input type="file" name="scan_picare" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                        </>
                                                    )}
                                                    
                                                    {currentFormTab === 'persalinan' && (
                                                        <>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">Picare Puskesmas</label><input type="file" name="scan_picare" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">Buku KIA</label><input type="file" name="scan_kia" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">Partograf</label><input type="file" name="scan_partograf" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">MKJP</label><input type="file" name="scan_mkjp" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                        </>
                                                    )}
                                                    
                                                    {currentFormTab === 'bayi' && (
                                                        <>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">SKM Dinsos</label><input type="file" name="scan_skm_dinsos" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">Keterangan Lahir</label><input type="file" name="scan_lahir" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                            <div><label className="block text-[10px] uppercase font-bold mb-1">Keterangan Dirawat</label><input type="file" name="scan_dirawat" className="w-full text-xs border rounded p-1 bg-white" /></div>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex justify-center border-t pt-6">
                                            <button type="submit" disabled={isSubmitting} className="px-12 py-3 bg-[#4a148c] text-white rounded font-bold shadow hover:bg-[#6a1b9a] flex items-center">
                                                {isSubmitting ? <RefreshCw className="animate-spin mr-2" size={18}/> : null} Kirim Permohonan
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* View: AKUN KHUSUS ADMIN */}
                    {currentView === 'akun' && loginRole === 'dinas' && (
                        <div className="space-y-6 animate-zoom-in">
                            
                            {/* Card Ganti Password Admin */}
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                <h2 className="font-bold text-gray-800 mb-4 flex items-center">
                                    <Shield className="mr-2 text-purple-700" size={20}/> Ubah Sandi Admin Dinkes
                                </h2>
                                <div className="flex items-end gap-4 max-w-md">
                                    <div className="flex-1 relative">
                                        <label className="block text-xs font-bold text-gray-700 mb-1">Sandi Admin Baru</label>
                                        <input 
                                            type={showAdminPassword ? "text" : "password"} 
                                            value={adminNewPassword} 
                                            onChange={(e) => setAdminNewPassword(e.target.value)} 
                                            placeholder="Sandi baru..." 
                                            className="w-full px-3 py-2 border border-gray-300 rounded-lg pr-10 focus:ring-purple-500 focus:outline-none" 
                                        />
                                        <button 
                                            type="button" 
                                            onClick={() => setShowAdminPassword(!showAdminPassword)} 
                                            className="absolute inset-y-0 right-0 pr-3 pb-1 flex items-center text-gray-500 hover:text-purple-700 mt-5"
                                        >
                                            {showAdminPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                        </button>
                                    </div>
                                    <button 
                                        onClick={handleUpdateAdminPassword} 
                                        disabled={isAdminUpdating || !adminNewPassword} 
                                        className="bg-purple-700 hover:bg-purple-800 text-white px-4 py-2 rounded-lg font-bold shadow disabled:bg-gray-400"
                                    >
                                        {isAdminUpdating ? 'Loading...' : 'Simpan'}
                                    </button>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border p-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-bold text-gray-800">Manajemen Sandi Desa</h2>
                                    <button onClick={()=>setCurrentView('dashboard')} className="text-sm bg-gray-200 px-3 py-1 rounded">Kembali</button>
                                </div>
                                
                                <table className="w-full text-sm border">
                                    <thead className="bg-[#4a148c] text-white">
                                        <tr>
                                            <th className="px-4 py-3 text-left">Wilayah Desa</th>
                                            <th className="px-4 py-3 text-center">Aksi / Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {akunDesaList.map(akun => (
                                        <tr key={akun.id} className="border-t hover:bg-gray-50">
                                            <td className="px-4 py-3">
                                                <b>Desa {akun.desa}</b> - Kec. {akun.kecamatan}<br/>
                                                {akun.status === 'pending' ? (
                                                    <span className="text-xs text-blue-600 font-mono mt-1 block">Minta Sandi Baru: <b>{akun.password}</b></span>
                                                ) : (
                                                    <span className="text-xs text-green-700 font-mono mt-1 block">Sandi Aktif: <b>{akun.password}</b></span>
                                                )}
                                            </td>
                                            <td className="px-4 py-3 text-center">
                                                {akun.status === 'pending' ? (
                                                    <div className="flex gap-2 justify-center">
                                                        <button onClick={() => eksekusiSetujuAkun(akun.id)} className="bg-green-600 text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-green-700 shadow">Setuju</button>
                                                        <button onClick={() => setConfirmResetId(akun.id)} className="bg-red-600 text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-red-700 shadow">Tolak</button>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center justify-center gap-3">
                                                        <span className="text-xs font-bold text-green-600 bg-green-50 border border-green-200 px-2 py-1 rounded">Aktif</span>
                                                        <button onClick={() => setConfirmResetId(akun.id)} className="text-red-500 hover:text-red-700 bg-gray-100 hover:bg-red-50 p-1.5 rounded transition shadow-sm" title="Hapus & Reset Sandi ke Default">
                                                            <Trash2 size={16}/>
                                                        </button>
                                                    </div>
                                                )}
                                            </td>
                                        </tr>
                                        ))}
                                        {akunDesaList.length === 0 && (
                                            <tr><td colSpan="2" className="text-center py-6 text-gray-500">Belum ada data sandi desa yang didaftarkan.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </main>

                {/* MODAL SECTION */}
                {detailModalData && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-lg shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
                            <div className="px-4 py-3 bg-[#5b3278] flex justify-between items-center text-white">
                                <h3 className="font-bold">Detail Form ({detailModalData.kategori?.toUpperCase()})</h3>
                                <button onClick={() => setDetailModalData(null)}><X size={20}/></button>
                            </div>
                            <div className="p-4 overflow-y-auto grid grid-cols-2 gap-3 text-sm">
                                <div className="col-span-2 mb-2 p-3 bg-gray-100 rounded">
                                    <b>{detailModalData.nama}</b> ({detailModalData.nik})<br/>
                                    Desa {detailModalData.desa} - Kec. {detailModalData.kecamatan}
                                </div>
                                
                                {allFormFields.map((field) => !field.startsWith('scan_') && (
                                    <div key={field} className="border p-2 rounded">
                                        <span className="text-[10px] font-bold uppercase text-gray-500 block">{field.replace(/_/g, ' ')}</span>
                                        {detailModalData.detail?.[field] || '-'}
                                    </div>
                                ))}
                                
                                <div className="col-span-2 font-bold text-[#4a148c] mt-2 border-t pt-2">Lampiran File</div>
                                
                                {allFormFields.map((field) => field.startsWith('scan_') && (
                                    <div key={field} className="border p-2 rounded">
                                        <span className="text-[10px] font-bold uppercase text-gray-500 block mb-1">{field.replace(/_/g, ' ')}</span>
                                        {detailModalData.detail?.[field]?.url ? (
                                            <a href={detailModalData.detail[field].url} target="_blank" className="text-blue-600 text-xs font-bold hover:underline">Buka Berkas</a> 
                                        ) : (
                                            <i className="text-gray-400 text-xs">Kosong</i>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

                {uploadRekomId && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-lg p-6 max-w-sm w-full">
                            <h3 className="font-bold mb-4">Unggah TTD Rekomendasi</h3>
                            <input type="file" onChange={(e) => setFileRekomendasi(e.target.files[0])} className="w-full mb-4 text-sm" />
                            <div className="flex justify-end gap-2">
                                <button onClick={()=>{setUploadRekomId(null); setFileRekomendasi(null);}} className="px-4 py-2 border rounded text-sm">Batal</button>
                                <button onClick={eksekusiUploadRekomendasi} disabled={isSubmitting} className="px-4 py-2 bg-[#4a148c] text-white rounded text-sm">
                                    {isSubmitting ? 'Loading...' : 'Simpan'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {terimaModalId && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-lg p-6 max-w-sm w-full">
                            <h3 className="font-bold text-green-700 mb-2">Setujui Permohonan?</h3>
                            <p className="text-sm mb-4">Akan dipindah ke Menu Rekomendasi.</p>
                            <div className="flex justify-end gap-2">
                                <button onClick={()=>setTerimaModalId(null)} className="px-4 py-2 border rounded text-sm">Batal</button>
                                <button onClick={eksekusiTerima} className="px-4 py-2 bg-green-600 text-white rounded text-sm">Lanjutkan</button>
                            </div>
                        </div>
                    </div>
                )}

                {tolakModalId && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-lg p-6 max-w-sm w-full">
                            <h3 className="font-bold text-red-700 mb-2">Tolak Permohonan</h3>
                            <textarea value={tolakAlasan} onChange={e=>setTolakAlasan(e.target.value)} rows="3" className="w-full border rounded p-2 text-sm mb-4" placeholder="Alasan..."></textarea>
                            <div className="flex justify-end gap-2">
                                <button onClick={()=>setTolakModalId(null)} className="px-4 py-2 border rounded text-sm">Batal</button>
                                <button onClick={eksekusiTolak} className="px-4 py-2 bg-red-600 text-white rounded text-sm">Tolak</button>
                            </div>
                        </div>
                    </div>
                )}

                {hapusTarget && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-lg p-6 max-w-sm w-full text-center">
                            <Trash2 size={40} className="mx-auto text-red-500 mb-2"/>
                            <h3 className="font-bold text-red-700 mb-4">Hapus Data Permanen?</h3>
                            <div className="flex justify-center gap-2">
                                <button onClick={()=>setHapusTarget(null)} className="px-4 py-2 border rounded text-sm">Batal</button>
                                <button onClick={eksekusiHapus} className="px-4 py-2 bg-red-600 text-white rounded text-sm">Hapus</button>
                            </div>
                        </div>
                    </div>
                )}

                {confirmResetId && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-lg p-6 max-w-sm w-full text-center">
                            <AlertCircle size={40} className="mx-auto text-yellow-500 mb-2"/>
                            <h3 className="font-bold text-gray-800 mb-2">Reset Sandi ke Default?</h3>
                            <p className="text-sm text-gray-600 mb-4">Sandi desa ini akan dihapus dan dikembalikan ke <b>"Jamkesda2026"</b>.</p>
                            <div className="flex justify-center gap-2">
                                <button onClick={()=>setConfirmResetId(null)} className="px-4 py-2 border rounded text-sm hover:bg-gray-50">Batal</button>
                                <button onClick={eksekusiResetAkun} className="px-4 py-2 bg-red-600 text-white rounded text-sm hover:bg-red-700 shadow">Ya, Reset</button>
                            </div>
                        </div>
                    </div>
                )}
                
                <div className={`fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-[#311b51] text-white px-6 py-2 rounded-full text-sm shadow-xl transition-all z-50 ${toastMsg ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                    {toastMsg}
                </div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        
        try {
            const root = createRoot(rootElement);
            root.render(<App />);
            
            const loadingText = document.querySelector('#root > div[style]');
            if(loadingText) loadingText.remove();
        } catch (e) {
            document.getElementById('error-log').innerHTML += '<div style="padding: 10px; border-bottom: 1px solid #fca5a5;">🔥 <b>React Render Error:</b> ' + e.message + '</div>';
        }
    </script>
</body>
</html>
