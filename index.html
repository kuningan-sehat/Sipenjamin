          const [adminData, setAdminData] = useState({ password: 'Dinkes2026' });

          const [toastMsg, setToastMsg] = useState('');

          const [confirmApproveId, setConfirmApproveId] = useState(null);
          const [confirmResetId, setConfirmResetId] = useState(null);

          const [isSubmitting, setIsSubmitting] = useState(false);

          // Fungsi Unduh File (Bypass Cloudinary)
          const forceDownload = async (url, fileName) => {
              showToast("Memulai unduhan...");
              try {
                  const cleanUrl = url.replace('/upload/fl_attachment/', '/upload/');
                  const response = await fetch(cleanUrl);
                  if (!response.ok) throw new Error('Gagal mengambil file');
                  
                  const blob = await response.blob();
                  const blobUrl = window.URL.createObjectURL(blob);
                  const link = document.createElement('a');
                  link.href = blobUrl;
                  link.download = fileName || 'Dokumen_Rekomendasi.pdf';
                  document.body.appendChild(link);
                  link.click();
                  document.body.removeChild(link);
                  window.URL.revokeObjectURL(blobUrl);
              } catch (error) {
                  console.error('Gagal mengunduh via script:', error);
                  window.open(url.replace('/upload/fl_attachment/', '/upload/'), '_blank');
              }
          };

          useEffect(() => {
            const initAuth = async () => {
              try { await signInAnonymously(auth); } 
              catch (err) { console.error("Auth error:", err); setErrorMsg("Gagal terhubung ke Authentication."); }
            };
            initAuth();

            const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
              setUser(currentUser);
              if (!currentUser || appState === 'loading') setAppState('login');
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return; 

            const adminRef = doc(db, 'admin', 'dinkes');
            const unsubAdmin = onSnapshot(adminRef, (docSnap) => {
              if (docSnap.exists()) setAdminData(docSnap.data());
            }, (err) => console.error(err));

            if (appState !== 'dashboard') return;

            const permohonanRef = collection(db, 'permohonan_jamkesda');
            const unsubscribePermohonan = onSnapshot(permohonanRef, (snapshot) => {
              const data = [];
              snapshot.forEach(document => data.push({ id: document.id, ...document.data() }));
              data.sort((a, b) => b.createdAt - a.createdAt);
              setPermohonanList(data);
            }, (err) => console.error(err));

            let unsubscribeAkun = () => {};
            if (loginRole === 'dinas') {
              const akunRef = collection(db, 'akun_desa');
              unsubscribeAkun = onSnapshot(akunRef, (snapshot) => {
                const akunData = [];
                snapshot.forEach(document => akunData.push({ id: document.id, ...document.data() }));
                setAkunDesaList(akunData);
              }, (err) => console.error(err));
            }

            return () => { unsubAdmin(); unsubscribePermohonan(); unsubscribeAkun(); };
          }, [user, appState, loginRole]);

          const showToast = (msg) => {
             setToastMsg(msg);
             setTimeout(() => setToastMsg(''), 3000);
          }

          const handleLogin = async (e) => {
            e.preventDefault();
            setErrorMsg('');

            if (loginRole === 'dinas') {
              const currentAdminPwd = adminData?.password || 'Dinkes2026';
              if (dinasUsername === 'admin' && password === currentAdminPwd) {
                setAppState('dashboard');
                setCurrentView('dashboard');
                setTableTabFilter('pending');
                return;
              } else {
                setErrorMsg('Username atau Password Dinas salah!');
                return;
              }
            }

            if (!loginKecamatan || !loginDesa || !password) {
              setErrorMsg('Kecamatan, Desa, dan Password wajib diisi.');
              return;
            }

            try {
              const docId = `${loginKecamatan}_${loginDesa}`.replace(/\s+/g, '_');
              const akunRef = doc(db, 'akun_desa', docId);
              const akunSnap = await getDoc(akunRef);
              
              if (!akunSnap.exists()) {
                if (password === 'Jamkesda2026') setAppState('change-password');
                else setErrorMsg('Password Desa salah atau belum didaftarkan.');
              } else {
                const dataAkun = akunSnap.data();
                if (password !== dataAkun.password) {
                  setErrorMsg('Password Desa salah.');
                  return;
                }
                if (dataAkun.status === 'pending') setAppState('waiting-approval');
                else if (dataAkun.status === 'approved') {
                  setAppState('dashboard');
                  setCurrentView('dashboard');
                  setTableTabFilter('pending');
                }
              }
            } catch (err) { 
                setErrorMsg('Gagal memverifikasi akun. Cek Rules Firestore Anda.'); 
            }
          };

          const handleChangePassword = async (e) => {
            e.preventDefault();
            if (newPassword.length < 6) { setErrorMsg('Password baru minimal 6 karakter.'); return; }
            if (newPassword !== confirmPassword) { setErrorMsg('Konfirmasi password tidak cocok.'); return; }
            try {
              const docId = `${loginKecamatan}_${loginDesa}`.replace(/\s+/g, '_');
              await setDoc(doc(db, 'akun_desa', docId), {
                kecamatan: loginKecamatan, desa: loginDesa, password: newPassword, status: 'pending', updatedAt: Date.now()
              });
              setAppState('waiting-approval');
            } catch (err) { setErrorMsg('Gagal menyimpan.'); }
          };

          const handleAddPermohonan = async (e) => {
            e.preventDefault();
            setIsSubmitting(true);
            const form = e.target;
            const fd = new FormData(form);
            const rawData = Object.fromEntries(fd.entries());
            
            const nik = rawData.nik;
            const nama = rawData.nama;
            
            if(!nik || !nama) {
                showToast("NIK dan Nama wajib diisi!");
                setIsSubmitting(false); return;
            }

            const detailData = {};
            allFormFields.forEach(f => detailData[f] = "");

            for (const [key, value] of fd.entries()) {
                if (value instanceof File) detailData[key] = null;
                else detailData[key] = value || "";
            }

            const uploadPromises = [];
            Array.from(form.elements).forEach(el => {
                if(el.type === 'file' && el.files.length > 0) {
                    const file = el.files[0];
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                    const uploadTask = fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, {
                        method: 'POST', body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.secure_url) detailData[el.name] = { url: data.secure_url, path: data.public_id, name: file.name };
                        else if (data.error) throw new Error(data.error.message);
                    }).catch(err => {
                        console.error("Cloudinary Error:", err);
                        showToast(`File gagal diupload: ${err.message}`);
                        detailData[el.name] = null;
                    });
                    uploadPromises.push(uploadTask);
                }
            });

            try {
              if (uploadPromises.length > 0) showToast("Mengunggah dokumen... Mohon tunggu");
              await Promise.all(uploadPromises); 

              await addDoc(collection(db, 'permohonan_jamkesda'), {
                nik: nik, nama: nama, kategori: currentFormTab,
                kecamatan: loginKecamatan, desa: loginDesa,
                status: 'pending', operatorId: user.uid,
                createdAt: Date.now(), detail: detailData
              });
              
              form.reset();
              setCurrentView('dashboard');
              setTableTabFilter('pending');
              showToast("Permohonan berhasil dikirim!");
            } catch (err) { showToast(`Gagal: ${err.message}`); } 
            finally { setIsSubmitting(false); }
          };

          const eksekusiHapus = async () => {
              if (!hapusTarget) return;
              try { await deleteDoc(doc(db, 'permohonan_jamkesda', hapusTarget.id)); showToast("Data berhasil dihapus"); } 
              catch(e){ showToast("Gagal menghapus data"); }

                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });

                                <p className="text-sm text-gray-700 mb-4 font-medium">Unggah berkas Rekomendasi (PDF/Gambar) yang sudah dicetak dan ditandatangani oleh pejabat berwenang.</p>
                                <div className="border-2 border-dashed border-[#5b3278] rounded-lg p-6 bg-white text-center">
                                    <input type="file" onChange={(e) => setFileRekomendasi(e.target.files[0])} className="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100 cursor-pointer" accept="application/pdf,image/*" />
                                </div>
                            </div>
                            <div className="px-6 py-4 bg-gray-100 border-t flex justify-end gap-3">
                                <button onClick={()=>{setUploadRekomId(null); setFileRekomendasi(null);}} className="px-5 py-2.5 rounded shadow text-sm font-bold text-gray-700 bg-white border hover:bg-gray-50">Batal</button>
                                <button onClick={eksekusiUploadRekomendasi} disabled={isSubmitting} className="px-5 py-2.5 rounded shadow text-sm font-bold text-white bg-[#4a148c] hover:bg-[#6a1b9a] flex items-center">
                                    {isSubmitting ? <RefreshCw className="animate-spin mr-2" size={16}/> : <CheckCircle2 className="mr-2" size={16}/>}
                                    Simpan & Kirim ke Desa
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* Modal Persetujuan Masuk (ke Menu Rekom) */}
                {terimaModalId && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center z-50 p-4 animate-zoom-in">
                        <div className="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden">
                            <div className="px-6 py-4 border-b bg-green-50"><h3 className="text-lg font-black text-green-800">Verifikasi Disetujui</h3></div>
                            <div className="p-6"><p className="text-sm text-gray-700 font-medium">Pengajuan ini akan disetujui secara sistem dan dipindahkan ke <strong>Menu Rekomendasi</strong> untuk menunggu proses pencetakan & tanda tangan basah.</p></div>
                            <div className="px-6 py-4 bg-gray-100 border-t flex justify-end gap-3"><button onClick={()=>setTerimaModalId(null)} className="px-5 py-2 bg-white border rounded shadow-sm text-sm font-bold text-gray-700 hover:bg-gray-50">Batal</button><button onClick={eksekusiTerima} className="px-5 py-2 border border-transparent rounded shadow-sm text-sm font-bold text-white bg-green-600 hover:bg-green-700 flex items-center">Lanjutkan <Check className="ml-1" size={16}/></button></div>
                        </div>
                    </div>
                )}

                {/* Modal Tolak */}
                {tolakModalId && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center z-50 p-4 animate-zoom-in">
                        <div className="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden">
                            <div className="px-6 py-4 border-b bg-red-800 text-white"><h3 className="text-lg font-bold">Tolak Permohonan</h3></div>
                            <div className="p-6 bg-gray-50"><label className="block text-sm font-bold text-gray-700 mb-2">Alasan Penolakan</label><textarea value={tolakAlasan} onChange={e=>setTolakAlasan(e.target.value)} rows="4" className="w-full border-gray-300 rounded-md shadow-sm border p-3 text-sm focus:ring-red-500" placeholder="Tuliskan alasan lengkap..."></textarea></div>
                            <div className="px-6 py-4 bg-gray-100 border-t flex justify-end gap-3"><button onClick={()=>setTolakModalId(null)} className="px-5 py-2 border rounded shadow-sm text-sm font-bold text-gray-700 bg-white hover:bg-gray-50">Batal</button><button onClick={eksekusiTolak} className="px-5 py-2 border border-transparent rounded shadow-sm text-sm font-bold text-white bg-red-600 hover:bg-red-700">Tolak Permohonan</button></div>
                        </div>
                    </div>
                )}

                {/* Modal Hapus */}
                {hapusTarget && (
                    <div className="fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center z-50 p-4 animate-zoom-in">
                        <div className="bg-white rounded-lg shadow-2xl w-full max-w-sm overflow-hidden">
                            <div className="px-6 py-4 border-b bg-red-50"><h3 className="text-lg font-bold text-red-800">Hapus Permanen?</h3></div>
                            <div className="p-6 text-center">
                                <Trash2 size={40} className="mx-auto text-red-400 mb-3"/>
                                <p className="text-sm text-gray-700 mb-2">Hapus pengajuan atas nama<br/><strong>{hapusTarget.nama}</strong>?</p>
                                <p className="text-xs text-red-600 font-bold bg-red-50 p-2 rounded">Tindakan ini tidak dapat dibatalkan!</p>
                            </div>
                            <div className="px-6 py-4 bg-gray-100 border-t flex justify-end gap-3"><button onClick={()=>setHapusTarget(null)} className="px-4 py-2 border rounded shadow-sm text-sm font-bold text-gray-700 bg-white">Batal</button><button onClick={eksekusiHapus} className="px-4 py-2 border border-transparent rounded shadow-sm text-sm font-bold text-white bg-red-600 hover:bg-red-700">Ya, Hapus!</button></div>
                        </div>
                    </div>
                )}

                <div className={`fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-[#311b51] text-white px-8 py-3 rounded-full shadow-2xl transition-all duration-300 z-50 flex items-center font-bold tracking-wide ${toastMsg ? 'translate-y-0 opacity-100' : 'translate-y-20 opacity-0'}`}>{toastMsg}</div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
